<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark">

<head>
    <meta charset="UTF-8">
    <title>Edit Post | Vibe Coding</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1313ec",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-[#f6f6f8] dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-6 py-20">
        <header class="mb-12">
            <div
                class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 border border-primary/20 text-primary text-xs font-bold uppercase tracking-widest mb-6">
                Edit Post
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">게시글 수정</h1>
            <p class="text-slate-500 dark:text-slate-400 text-lg">기존 게시글의 내용을 수정합니다.</p>
        </header>

        <form class="space-y-8" th:action="@{/posts/{no}/save(no=${post.no})}" method="post">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Read-only fields -->
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">번호</label>
                    <input type="text" th:value="${post.no}" readonly
                        class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-primary/10 text-slate-500 dark:text-slate-400 cursor-not-allowed">
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">조회수</label>
                    <input type="text" th:value="${post.views}" readonly
                        class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-primary/10 text-slate-500 dark:text-slate-400 cursor-not-allowed">
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">생성일</label>
                    <input type="text" th:value="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}" readonly
                        class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-primary/10 text-slate-500 dark:text-slate-400 cursor-not-allowed">
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">수정일</label>
                    <input type="text"
                        th:value="${post.updatedAt != null ? #temporals.format(post.updatedAt, 'yyyy-MM-dd') : ''}"
                        readonly
                        class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-primary/10 text-slate-500 dark:text-slate-400 cursor-not-allowed">
                </div>
            </div>

            <!-- Editable fields -->
            <div class="space-y-2">
                <label for="title" class="block text-sm font-bold text-slate-700 dark:text-slate-300">제목</label>
                <input type="text" id="title" name="title" th:value="${post.title}" required
                    class="w-full px-4 py-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-primary/20 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-white">
            </div>

            <div class="space-y-2">
                <label for="content" class="block text-sm font-bold text-slate-700 dark:text-slate-300">내용</label>
                <textarea id="content" name="content" rows="10" required
                    class="w-full px-4 py-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-primary/20 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-white resize-none"
                    th:text="${post.content}"></textarea>
            </div>

            <div class="flex items-center justify-end gap-4 pt-8 border-t border-slate-200 dark:border-primary/10">
                <a th:href="@{/posts/{no}(no=${post.no})}"
                    class="px-8 py-4 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-bold rounded-xl hover:bg-slate-300 dark:hover:bg-slate-700 transition-all">
                    취소
                </a>
                <button type="submit"
                    class="px-8 py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all">
                    저장하기
                </button>
            </div>
        </form>
    </div>
</body>

</html>
