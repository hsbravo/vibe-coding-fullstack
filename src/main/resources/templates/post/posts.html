<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark">

<head>
    <meta charset="UTF-8">
    <title>Post List | Vibe Coding</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1313ec",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-[#f6f6f8] dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-6 py-20">
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight mb-2">게시글 목록 <span
                        class="text-primary italic">Posts</span></h1>
                <p class="text-slate-500 dark:text-slate-400">VibeApp 메모리 기반 게시판 시스템</p>
            </div>
            <a href="/posts/new"
                class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white font-bold rounded-lg hover:scale-[1.02] transition-transform shadow-lg shadow-primary/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
                        clip-rule="evenodd" />
                </svg>
                새 글 작성
            </a>
        </header>

        <div
            class="bg-white dark:bg-background-dark border border-slate-200 dark:border-primary/10 rounded-xl shadow-xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 dark:bg-primary/5">
                    <tr>
                        <th class="px-6 py-4 text-sm font-bold uppercase tracking-wider text-primary">번호</th>
                        <th class="px-6 py-4 text-sm font-bold uppercase tracking-wider text-primary">제목</th>
                        <th class="px-6 py-4 text-sm font-bold uppercase tracking-wider text-primary">생성일</th>
                        <th class="px-6 py-4 text-sm font-bold uppercase tracking-wider text-primary">조회수</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 dark:divide-primary/5">
                    <tr th:each="post : ${page.items}"
                        class="hover:bg-slate-50 dark:hover:bg-primary/5 transition-colors">
                        <td class="px-6 py-4 text-sm font-medium" th:text="${post.id}">1</td>
                        <td class="px-6 py-4 text-sm font-bold">
                            <a th:href="@{/posts/{id}(id=${post.id})}" class="hover:text-primary transition-colors"
                                th:text="${post.title}">게시글 제목</a>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-500"
                            th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                        <td class="px-6 py-4 text-sm">
                            <span class="px-2 py-1 bg-primary/10 text-primary text-xs font-bold rounded-full"
                                th:text="${post.views}">0</span>
                        </td>
                    </tr>
                    <tr th:if="${page.totalItems == 0}">
                        <td colspan="4" class="px-6 py-12 text-center text-slate-500 dark:text-slate-400">
                            게시글이 없습니다.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="mt-8 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-2">
                <a th:href="@{/posts(page=${page.currentPage - 1})}" th:if="${page.hasPrevious()}"
                    class="px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-primary/20 rounded-lg text-sm font-bold hover:bg-slate-50 dark:hover:bg-primary/5 transition-colors">
                    이전
                </a>
                <div class="flex items-center gap-1">
                    <a th:each="i : ${#numbers.sequence(1, page.totalPages)}" th:href="@{/posts(page=${i})}"
                        th:text="${i}"
                        th:classappend="${i == page.currentPage} ? 'bg-primary text-white' : 'bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-primary/20 hover:bg-slate-50 dark:hover:bg-primary/5'"
                        class="w-10 h-10 flex items-center justify-center rounded-lg border text-sm font-bold transition-all">
                        1
                    </a>
                </div>
                <a th:href="@{/posts(page=${page.currentPage + 1})}" th:if="${page.hasNext()}"
                    class="px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-primary/20 rounded-lg text-sm font-bold hover:bg-slate-50 dark:hover:bg-primary/5 transition-colors">
                    다음
                </a>
            </div>

            <div class="flex gap-4">
                <a href="/"
                    class="px-6 py-3 bg-slate-200 dark:bg-slate-800 text-sm font-bold rounded-lg hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
                    메인으로 돌아가기
                </a>
            </div>
        </div>
    </div>
</body>

</html>
